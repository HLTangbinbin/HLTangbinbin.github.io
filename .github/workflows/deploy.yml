  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      # ✅ ✅ ✅ 新增：备份 frontend
      - name: Backup current frontend
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          ssh -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << EOF
            if [ -d "${{ secrets.SERVER_PATH }}" ]; then
              cp -r ${{ secrets.SERVER_PATH }} ${{ secrets.SERVER_PATH }}_$TIMESTAMP
              echo "✅ 备份完成: ${{ secrets.SERVER_PATH }}_$TIMESTAMP"
            else
              echo "⚠️ 目录不存在，跳过备份"
            fi
          EOF

      # 原有部署（完全不动）
      - name: Sync dist to server
        run: |
          rsync -az --delete \
            --exclude 'resource/' \
            -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            dist/ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PATH }}/"